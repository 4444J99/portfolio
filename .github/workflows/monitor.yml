name: Weekly Monitor

on:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:security:prod || true
      - run: npm run test:security || true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-artifacts
          path: .quality/security-*.json

  performance:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium || true
      - run: npm run lighthouse || true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: perf-artifacts
          path: .lighthouseci/
