name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: read
  issues: write

env:
  QUALITY_PHASE: W12

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Security gates
        run: |
          npm run test:security:prod
          npm run test:security
          npm run test:security:github
          npm run test:security:drift
      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-artifacts
          path: .quality/security-*.json
          include-hidden-files: true

  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck:strict

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Sync Data
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          npm run sync:github-pages
          npm run sync:vitals
          npm run sync:omega
          npm run sync:identity
      - name: Build
        run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: build-dist
          path: dist/
          retention-days: 1
      - name: Upload data
        uses: actions/upload-artifact@v7
        with:
          name: built-data
          path: src/data/
          retention-days: 1

  test-unit:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: build-dist
          path: dist
      - name: Unit Tests & Coverage
        run: npm run test:coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/

  test-a11y:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: build-dist
          path: dist
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: A11y Static Audit
        run: npm run test:a11y
      - name: A11y Runtime Audit
        run: npm run test:a11y:runtime
      - name: A11y Coverage
        run: npm run test:a11y:coverage
      - name: Upload a11y artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: a11y-artifacts
          path: .a11y/

  test-e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: build-dist
          path: dist
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: E2E Smoke Tests
        run: npm run test:e2e:smoke
      - name: Runtime Errors
        run: npm run test:runtime:errors
      - name: Validate Build Links
        run: npm run validate
      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts
          path: .quality/e2e-*.json

  performance:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: build-dist
          path: dist
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Collect Perf Metrics
        run: npm run collect:perf
      - name: Perf Budgets
        run: npm run test:perf:budgets
      - name: Lighthouse (no-upload)
        run: npm run lighthouse
      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-artifacts
          path: |
            .quality/perf-*.json
            .lighthouseci/

  finalize:
    needs: [security, lint-and-typecheck, test-unit, test-a11y, test-e2e, performance]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Consolidate artifacts
        run: |
          mkdir -p .quality .a11y src/data
          cp -r artifacts/security-artifacts/* .quality/ 2>/dev/null || true
          cp -r artifacts/e2e-artifacts/* .quality/ 2>/dev/null || true
          cp -r artifacts/perf-artifacts/.quality/* .quality/ 2>/dev/null || true
          cp -r artifacts/a11y-artifacts/* .a11y/ 2>/dev/null || true
          cp -r artifacts/built-data/* src/data/ 2>/dev/null || true
      - name: Quality summary
        run: npm run quality:summary -- --allow-missing
      - name: Generate Badges
        run: npm run generate-badges
      - name: Quality Ledger
        run: npm run quality:ledger
      - name: Check Overall Status
        run: |
          if [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.lint-and-typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.test-unit.result }}" != "success" ]] || \
             [[ "${{ needs.test-a11y.result }}" != "success" ]] || \
             [[ "${{ needs.test-e2e.result }}" != "success" ]]; then
            echo "One or more quality gates failed."
            exit 1
          fi
          if [[ "${{ needs.performance.result }}" != "success" ]]; then
            echo "⚠ Performance job failed (advisory, does not block deploy)."
          fi
