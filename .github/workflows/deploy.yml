name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: ["Quality Gates"]
    branches: [main]
    types: [completed]
  schedule:
    - cron: "15 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  issues: write
  id-token: write # allow-secret

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check-quality:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      quality-passed: ${{ steps.check.outputs.passed }}
    steps:
      - name: Verify latest quality run passed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          conclusion=$(gh run list --workflow quality.yml --branch main --limit 1 --json conclusion -q '.[0].conclusion' --repo "$GITHUB_REPOSITORY")
          if [ "$conclusion" = "success" ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Latest quality run conclusion: $conclusion — skipping deploy"
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: [check-quality]
    if: >-
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'schedule' && needs.check-quality.outputs.quality-passed == 'true') ||
        (github.event_name == 'workflow_run' &&
         github.event.workflow_run.conclusion == 'success')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Guard GitHub Pages core drift
        run: npm run check:github-pages-core
      - name: Sync GitHub Pages index
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run sync:github-pages
      - name: Validate GitHub Pages index
        run: npm run validate:github-pages -- --max-age-hours 72 --max-errored 8 --max-unreachable 5
      - name: Emit GitHub Pages telemetry
        run: npm run telemetry:github-pages
      - name: Evaluate GitHub Pages alert rules
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run alerts:github-pages
      - name: Upload GitHub Pages telemetry artifacts
        uses: actions/upload-artifact@v7
        with:
          name: github-pages-telemetry-${{ github.run_id }}
          path: |
            .quality/github-pages-telemetry.json
            .quality/github-pages-alerts.json
          if-no-files-found: ignore
          retention-days: 14
      - run: npm run build
        env:
          PUBLIC_CONSULT_API_BASE: https://portfolio-consult-api.ivixivi.workers.dev
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
      - uses: actions/upload-artifact@v7
        with:
          name: deploy-dist
          path: dist/
          retention-days: 1

  deploy:
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  verify:
    needs: deploy
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      smoke-passed: ${{ steps.smoke.outputs.passed }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Post-deploy smoke test
        id: smoke
        run: |
          if node scripts/post-deploy-smoke.mjs; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi

  lighthouse:
    needs: [build, verify]
    if: always() && needs.verify.outputs.smoke-passed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: deploy-dist
          path: dist
      - name: Lighthouse
        run: npm run lighthouse
      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-deploy-${{ github.run_id }}
          path: .lighthouseci/
          retention-days: 7

  rollback:
    needs: [deploy, verify]
    if: always() && needs.verify.outputs.smoke-passed == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 2
      - name: Revert to previous deploy
        run: |
          echo "Rolling back gh-pages to previous commit..."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          prev_sha=$(git rev-parse HEAD~1)
          git reset --hard "$prev_sha"
          git push --force-with-lease origin gh-pages
          echo "Rolled back to $prev_sha"
      - name: Create rollback issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Auto-rollback triggered — deploy smoke test failed" \
            --body "Deploy from commit ${{ github.sha }} failed post-deploy smoke tests.

          gh-pages was automatically rolled back to the previous deployment.

          [Failed run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          **Action required:** investigate the failure, fix, and re-deploy."
