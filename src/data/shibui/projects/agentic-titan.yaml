  - heading: "Production Safety Layer"
    units:
      - id: "agentic-titan.production-safety-layer.p1"
        elevated_preview: "Agentic Titan implements safety not as guardrails added to a finished system but..."
        entry: "I built safety into the execution path itself, not bolted on as guardrails after the fact. Every agent action flows through the safety chain before it runs. Circuit breakers, budgets, human approval gates, role-based access, and kill switches are all first-class primitives that can't be bypassed."
  - heading: "Model Agnosticism"
    units:
      - id: "agentic-titan.model-agnosticism.p1"
        elevated_preview: "The framework treats LLM providers as interchangeable execution substrates with ..."
        entry: "I treat AI model providers as interchangeable execution substrates, not as frameworks to build around. A uniform adapter interface supports four providers -- Anthropic, OpenAI, Ollama, and Groq -- each exposing identical methods for text generation, tool use, and streaming. Switching from cloud to air-gapped deployment means changing environment variables, not rewriting agents."
