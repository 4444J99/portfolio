        elevated_preview: "Every multi-repository organization faces the same entropy: standards drift, sec..."
        entry: "I built a single repository that governs every other repo in the organization. It pushes out shared CI pipelines, security scanning, contributor guidelines, and AI agent configs so that no individual project has to reinvent those wheels. One source of truth, inherited everywhere."
  - heading: "Community Health Layer"
    units:
      - id: "org-architecture.community-health-layer.p1"
        elevated_preview: "The foundation of any collaborative software project is not its code but its soc..."
        entry: "I set up shared community health files -- a code of conduct, contributing guide, security policy, and support docs -- that automatically appear on every repo in the org. Instead of copying boilerplate, each repo inherits thoughtful governance documents tailored to the system's values and threat model."
  - heading: "CI/CD Infrastructure"
    units:
      - id: "org-architecture.ci-cd-infrastructure.p1"
        elevated_preview: "The second layer transforms GitHub Actions from per-repository configuration fil..."
        entry: "I turned GitHub Actions into a shared platform for the whole org. Each repo calls centralized, reusable workflows instead of maintaining its own pipeline. Every action reference is SHA-pinned to a specific commit, which prevents supply-chain attacks from compromised tags."
      - id: "org-architecture.ci-cd-infrastructure.p2"
