  - heading: "AI Agent Framework"
    units:
      - id: "org-architecture.ai-agent-framework.p1"
        elevated_preview: "The third layer is the most forward-looking: a framework of production AI agents..."
        entry: "I built a layer of specialized AI agents that plug directly into the development workflow. Security agents review pull requests for vulnerabilities, documentation agents keep READMEs consistent across all repos, and infrastructure agents validate workflow configurations. They all work through GitHub Copilot, so there is no separate toolchain to learn."
  - heading: "Design Philosophy: Infrastructure as Culture"
    units:
      - id: "org-architecture.design-philosophy-infrastructure-as-culture.p1"
        elevated_preview: "The deeper claim of this project is that organizational culture can be encoded a..."
        entry: "I believe organizational culture can be encoded as versionable, reviewable code -- just like server infrastructure. When a Code of Conduct lives in a Git repository, it has a commit history, a blame log, and a review trail. When CI policy changes, the diff is visible and you can roll back. This turns governance from an unwritten social agreement into an explicit, testable system."
      - id: "org-architecture.design-philosophy-infrastructure-as-culture.p2"
        elevated_preview: "The decision to make AI agents part of this governance layer — rather than a sep..."
        entry: "I made AI agents part of the governance layer rather than a separate system. An agent's prompt is as consequential as a CI pipeline config, so it should be versioned, reviewed, and access-controlled through the same Git workflows. This makes agent capabilities visible, auditable, and revocable."
  - heading: "Automation Pipeline"
    units:
      - id: "org-architecture.automation-pipeline.p1"
        elevated_preview: "Beyond static governance files, the repository includes a Python automation laye..."
        entry: "I built a Python automation layer that goes beyond static governance files. It includes health score calculations, workflow analysis, label synchronization, action pin updates, and batch onboarding -- all as production modules with typed interfaces and test coverage. Everything needed to manage the organization is generated from code and deployed through the same CI pipelines as application software."
  - heading: "Testing and Verification"
    units:
      - id: "org-architecture.testing-and-verification.p1"
        elevated_preview: "The repository maintains over sixty unit tests covering every automation module ..."
        entry: "I wrote over sixty unit tests covering every automation module and AI framework component. Security tests are not isolated in a separate folder -- they are woven throughout the automation modules so that every component handling external resources or untrusted input is tested against adversarial scenarios. The test suite validates everything from label schemas to SSRF protection logic."
