        elevated_preview: "Aetheria is the project that proves the system works — and honestly reveals wher..."
        entry: "I took a classroom RPG from theory through game design to a revenue product, following my own governance pipeline end to end. It proved the system works -- and honestly showed where it doesn't. I'm including the full post-mortem because honest failures teach more than polished wins."
  - heading: "The Theory (ORGAN-I)"
    units:
      - id: "aetheria-rpg.the-theory-organ-i.p1"
        elevated_preview: "Not shallow \"add points and badges\" gamification. Structural gamification — usin..."
        entry: "I’m building a role-playing game where the world isn't just a static map, but a living system that reacts to how players behave. I designed an engine that tracks every decision and interaction, allowing the story and environment to shift based on the collective weight of those choices. It’s my way of moving past scripted paths to create a space where the narrative feels earned and truly unique to the person playing."
  - heading: "Technical Architecture"
    units:
      - id: "aetheria-rpg.technical-architecture.p1"
        elevated_preview: "Aetheria is a React 19 single-page application built with TypeScript 5.9 (strict..."
        entry: "I built Aetheria as a React 19 app with TypeScript in strict mode, Vite, and Tailwind CSS. I separated concerns into three React contexts: one for game state, one for Firebase authentication, and one for theming. State mutations flow through typed action functions that enforce game rules before updating, which prevents the spaghetti coupling that usually plagues educational software."
      - id: "aetheria-rpg.technical-architecture.p2"
        elevated_preview: "The domain model defines over 30 TypeScript interfaces organized into five layer..."
        entry: "I defined over 30 TypeScript interfaces across five layers before writing a single React component. The domain model covers game mechanics, educator tools, personalization, standards alignment, and system notifications. Six quest types each have distinct XP values and prerequisite chains, following a clear status machine from locked through completion or failure."
  - heading: "Game Mechanics in Depth"
    units:
      - id: "aetheria-rpg.game-mechanics-in-depth.p1"
        elevated_preview: "The XP and level progression system uses an eight-tier curve (Novice through Leg..."
        entry: "I designed an eight-tier progression curve from Novice through Legend, where each tier requires progressively more effort. Level-ups trigger sound effects and notifications to maintain the feedback loop. I calibrated the curve so the difficulty stays in the sweet spot between boredom and anxiety -- keeping students engaged without overwhelming them."
