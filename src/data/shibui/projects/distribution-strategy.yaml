  - heading: "Content Calendar Architecture"
    units:
      - id: "distribution-strategy.content-calendar-architecture.p1"
        elevated_preview: "The content calendar is driven by external rhythms rather than internal cadences..."
        entry: "I timed my content calendar around external rhythms rather than arbitrary internal cadences. Grant deadlines trigger increased visibility two to four weeks beforehand, conference seasons create attention windows for technical content, and the academic calendar shapes posting density. The schedule responds to when specific audiences are actually paying attention."
  - heading: "Measuring Distribution Without Vanity Metrics"
    units:
      - id: "distribution-strategy.measuring-distribution-without-vanity-metrics.p1"
        elevated_preview: "The distribution strategy deliberately avoids vanity metrics — follower counts, ..."
        entry: "I deliberately avoid vanity metrics like follower counts and like ratios. Instead I track whether the right people encountered the right content: weekly leading indicators like click-through rates to canonical URLs, quarterly lagging indicators like conference acceptance rates and interview invitations, and monthly health checks on audience segment composition."
