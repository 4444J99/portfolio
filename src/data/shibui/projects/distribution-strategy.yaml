  - heading: "Channel-Native Adaptation"
    units:
      - id: "distribution-strategy.channel-native-adaptation.p1"
        elevated_preview: "The critical distinction in this distribution strategy is between cross-posting ..."
        entry: "I do not cross-post -- I genuinely re-frame each piece of content for the channel it is going to. A Mastodon thread has different conventions than a newsletter digest, which is different from a GitHub Pages essay. Each channel gets content adapted to its discourse norms, not a copy-paste."
  - heading: "Automated Distribution Infrastructure"
    units:
      - id: "distribution-strategy.automated-distribution-infrastructure.p1"
        elevated_preview: "The distribution system is not a manual checklist but an automated pipeline impl..."
        entry: "I replaced my manual checklists with an automated system that handles everything whenever I finish a project. I built a pipeline that double-checks my work for errors, updates my portfolio across different platforms, and formats the same content for social media and professional sites simultaneously. This ensures my work is always consistent and up-to-date everywhere without me having to repeat the same steps by hand."
