        elevated_preview: "You can build [dynamic] repositories with [dynamic] words of documentation and i..."
        entry: "I realized that building a massive system means nothing if nobody ever sees it. Most engineers treat distribution as an afterthought -- a tweet or a Slack link. I decided to make distribution a first-class concern with its own dedicated infrastructure."
  - heading: "The POSSE Principle"
    units:
      - id: "distribution-strategy.the-posse-principle.p1"
        elevated_preview: "The distribution strategy is built on the POSSE principle: Publish on your Own S..."
        entry: "I make sure my work starts on my own website first. This way, I own everything I create instead of just handing it over to social media companies. After it’s safely on my site, I share it elsewhere to reach more people, but the original version always stays under my control."
  - heading: "Audience Segmentation"
