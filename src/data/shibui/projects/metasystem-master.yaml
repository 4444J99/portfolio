        entry: "I designed the system around one core idea: the audience is a co-performer, not just a data source. The performer always stays in control through three override modes, but the result is a real-time negotiation between crowd desire and artistic intent."
  - heading: "The Consensus Algorithm"
    units:
      - id: "metasystem-master.the-consensus-algorithm.p1"
        elevated_preview: "Audience inputs are batched, never processed individually. The consensus loop ru..."
        entry: "I batch all audience inputs instead of processing them one at a time. A consensus loop runs every 50 milliseconds, computing weighted averages across three axes -- spatial proximity, recency, and convergence -- that together determine what the audience \"wants.\""
      - id: "metasystem-master.the-consensus-algorithm.p2"
        elevated_preview: "Spatial weighting uses exponential decay from the stage — closer audience member..."
        entry: "I implemented three weighting axes. Spatial weighting gives closer audience members more influence. Temporal weighting responds to what the audience wants right now, not their historical average. Consensus weighting detects clusters, so converging inputs amplify each other and produce decisive group movements."
  - heading: "Implementation"
    units:
      - id: "metasystem-master.implementation.p1"
