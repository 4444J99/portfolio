        entry: "I built this as a five-package monorepo in TypeScript and Python. The core engine handles over a thousand concurrent audience connections through WebSockets, while a separate performer namespace gives the artist authenticated control. Outlier rejection and smoothing keep any single audience member from hijacking the output."
