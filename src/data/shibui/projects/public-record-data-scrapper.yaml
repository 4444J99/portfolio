        entry: "I built this as a TypeScript monorepo: React 19 frontend on Vercel, Express API backend, PostgreSQL, Redis, and BullMQ for background jobs. Three application targets — web, Tauri desktop, and mobile — share code through internal packages. The backend implements nineteen domain services, each owning a distinct slice of the business logic."
