    units:
      - id: "public-record-data-scrapper.the-challenge-of-50-state-scale.p1"
        elevated_preview: "Public record data in the United States is structurally fragmented. Each state m..."
        entry: "I directed the architecture of a platform that automates public record extraction across all 50 US states. Each state has its own UCC filing system with different interfaces and anti-scraping measures — a human researcher covers two or three states per day. I replaced that with 60+ autonomous agents extracting filings continuously, enriching them with multi-source intelligence, and delivering scored leads through a full React application."
