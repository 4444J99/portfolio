        entry: "I chose a unified TypeScript monorepo over polyglot microservices to eliminate integration errors through shared types. I used Puppeteer for adversarial portals because headless Chrome can render what raw HTTP cannot. The tiered data model lets the platform provide real value at zero cost while reserving premium enrichment for subscribers."
