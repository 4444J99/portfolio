    units:
      - id: "eight-organ-system.the-dependency-rule.p1"
        elevated_preview: "The most important constraint, and the one that generated the most creative tens..."
        entry: "I enforced one strict rule: ideas can only flow in one direction. Theory feeds art, art feeds commerce, and nothing flows backward. This forced clean boundaries between the organs and created real stakes -- theory has to commit to art without knowing if it will ever become a product. 31 dependency edges, zero circular dependencies."
