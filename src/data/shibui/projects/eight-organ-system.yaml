        elevated_preview: "I started from a conviction: the way you organize creative work is creative work..."
        entry: "I believe the way you organize creative work is itself creative work. I wanted to find out what happens when you give governance decisions the same care as the art they coordinate. The result surprised me: the governance model became the most interesting artifact in the system."
  - heading: "How It Works"
    units:
      - id: "eight-organ-system.how-it-works.p1"
        elevated_preview: "Eight GitHub organizations, each representing a distinct organ with a Greek onto..."
        entry: "I organized my portfolio into eight online spaces, naming each after a Greek concept for a different \"organ\" of my work. I kept the project data separate from the site itself, using a central hub to pull them together. This lets me track the history of each area independently while showing you the whole system in one place."
      - id: "eight-organ-system.how-it-works.p2"
        elevated_preview: ""
        entry: "I separated the system this way to protect each kind of work from being judged by the wrong standards. Art shouldn't need to justify itself commercially, and theory shouldn't need to scale before it's explored. Each organ has its own rules, its own documentation standards, and its own definition of what \"good\" looks like."
  - heading: "The Registry"
    units:
      - id: "eight-organ-system.the-registry.p1"
        elevated_preview: "A machine-readable JSON registry serves as the single source of truth for all [d..."
        entry: "I built a single JSON file that tracks every repository in the system. It records each project's status, dependencies, and documentation tier. Automated scripts validate the registry against the live state of every repo, so nothing drifts out of sync without being caught."
