        entry: "I noticed that portfolios show finished work but hide everything that matters — the decisions, the dead ends, the debates. Code is public in open source, but the reasoning behind it stays locked in private channels. I built ORGAN V (Logos) to fix that: a dedicated system for making the process of building visible, structured, and citable."
