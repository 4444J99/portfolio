  - heading: "Risks and Mitigations"
    units:
      - id: "ai-conductor.risks-and-mitigations.p1"
        elevated_preview: "Amendment D of the system constitution — the AI Non-Determinism Acknowledgment —..."
        entry: "I wrote a constitutional amendment acknowledging that the same inputs produce different outputs across AI models and across time. Every AI-generated deliverable requires human review. The risks are real and specific -- I observed hallucinated details in 15-20% of drafts, voice drift after about 40 READMEs, and broken cross-references that only automated scripts caught."
      - id: "ai-conductor.risks-and-mitigations.p2"
        elevated_preview: ""
        entry: "I found that voice drift is the subtlest risk. Over a long generation session of 58 READMEs, AI output becomes more formulaic. The first five are distinctive; by number 40, everything starts converging. I solved this by batching by organ -- generating all repos within one domain together with domain-specific voice direction, then moving to the next."
