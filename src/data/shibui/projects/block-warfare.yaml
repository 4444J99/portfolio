page: projects/block-warfare
title: "TurfSynth AR: My Block Warfare"
tagline: "Directed architecture for location-based procedural generation"
sections:
  - heading: "The Problem: Geography as Decoration"
    units:
      - id: "block-warfare.the-problem-geography-as-decoration.p1"
        elevated_preview: "Location-based games have a geography problem. They overlay generic game mechani..."
        entry: "I wanted to build a location-based game where your actual neighborhood shapes the gameplay, not just the backdrop. Most AR games treat the real world as a blank grid — I set out to make the streets, parks, and buildings around you matter strategically."
  - heading: "Technical Architecture: TypeScript Monorepo"
    units:
      - id: "block-warfare.technical-architecture-typescript-monorepo.p1"
        elevated_preview: "TurfSynth is structured as a TypeScript monorepo managed with pnpm workspaces. I..."
        entry: "I organized the codebase as a TypeScript monorepo split into five packages, each owning a single responsibility: geospatial primitives, procedural generation, territory control, AR rendering, and the coordination server. This separation keeps each piece testable on its own and lets me swap out any layer without touching the others."
  - heading: "Procedural Generation: Geography as Level Designer"
    units:
      - id: "block-warfare.procedural-generation-geography-as-level-designer.p1"
        elevated_preview: "The procedural generation engine is the system's core intellectual contribution...."
        entry: "I built an engine that acts like a digital level designer, automatically carving out balanced battlefields so I don’t have to hand-draw every map. It translates abstract math into playable terrain by placing strategic cover and vertical paths exactly where they’re needed for fair competition. This system ensures that every new round feels fresh while still following the core rules of tactical movement and line-of-sight I established."
  - heading: "Territory Control: Claiming Real Boundaries"
    units:
      - id: "block-warfare.territory-control-claiming-real-boundaries.p1"
        elevated_preview: "The territory system is where geographic fidelity produces its most distinctive ..."
        entry: "I designed the territory system so players claim real city blocks, not abstract hexagons. Your dead-end street is genuinely easier to defend than a busy intersection, and a Manhattan block plays completely differently from a suburban cul-de-sac. The game boundaries follow actual streets, park edges, and property lines."
  - heading: "Spatial Indexing and Performance"
    units:
      - id: "block-warfare.spatial-indexing-and-performance.p1"
        elevated_preview: "A location-based game that lags when you cross the street is unplayable. TurfSyn..."
        entry: "I needed the game to answer \"what's nearby?\" in under a millisecond on every GPS update, so I built a two-tier spatial index. Nearby objects get full AR rendering while the broader zone stays tracked for strategic awareness. The result is smooth frame rates even in dense urban areas with hundreds of game features."
  - heading: "Design Philosophy: The ORGAN-I Connection"
    units:
      - id: "block-warfare.design-philosophy-the-organ-i-connection.p1"
        elevated_preview: "TurfSynth is an ORGAN-III commercial product — pragmatic, shippable, revenue-awa..."
        entry: "I built TurfSynth to be a practical, shippable product that actually makes money. Unlike my more experimental projects, I chose to focus on a design that works reliably for real-world customers right now. Every decision I made was about balancing high-quality results with the business reality of getting a finished tool into people's hands."
  - heading: "Gameplay Modes and Player Experience"
    units:
      - id: "block-warfare.gameplay-modes-and-player-experience.p1"
        elevated_preview: "TurfSynth supports four gameplay modes, each engaging differently with the geogr..."
        entry: "I designed four different ways to play, each using the map’s terrain in a unique way. I built a standard mode for classic territory control, a \"Blitz\" version for faster sessions on smaller maps, a \"Stealth\" option that hides player movements to reward careful scouting, and a \"High-Ground\" mode where holding hills provides a distinct advantage. This variety ensures the game stays interesting whether players want a quick match or a slow, tactical challenge."
  - heading: "Tradeoffs and Lessons"
    units:
      - id: "block-warfare.tradeoffs-and-lessons.p1"
        elevated_preview: "The hardest tradeoff is geographic fidelity versus playability. Real-world geogr..."
        entry: "I had to choose between making the map look exactly like the real world or making the game actually fun to play. I realized that keeping every street and building perfectly accurate made moving around feel slow and frustrating, so I decided to simplify the layout. By focusing on how players navigate rather than strict realism, I created a much smoother experience while still keeping the recognizable spirit of the original location."
