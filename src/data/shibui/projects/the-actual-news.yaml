page: projects/the-actual-news
title: "The Actual News"
tagline: "News as a public service — verifiable by design"
sections:
  - heading: "The Problem: Architectural Truthfulness"
    units:
      - id: "the-actual-news.the-problem-architectural-truthfulness.p1"
        elevated_preview: "The crisis in journalism is not primarily one of intent but of architecture. New..."
        entry: "I started from a simple question: what if a news platform made truthfulness the product, not a byproduct? Not fact-checking after publication, but an architecture where every story ships with a machine-readable verification spine — atomic claims with confidence scores, evidence graphs with provenance chains, and append-only correction history. If a story doesn't meet the evidence threshold, it doesn't publish."
  - heading: "Technical Architecture"
    units:
      - id: "the-actual-news.technical-architecture.p1"
        elevated_preview: "The platform is implemented as five TypeScript microservices behind a unified AP..."
        entry: "I designed this as five TypeScript microservices: Gateway for auth and routing, Story for narrative content, Claim for the atomic statement ledger, Evidence for the content-addressed object store, and Verify for the publish gate. Each service owns a distinct domain concept and deploys independently. Shared TypeScript definitions across all services eliminate integration errors."
  - heading: "The Evidence Graph"
    units:
      - id: "the-actual-news.the-evidence-graph.p1"
        elevated_preview: "The evidence graph is the system's epistemological core. Every piece of evidence..."
        entry: "I built the evidence graph as a content-addressed store where every piece of evidence is identified by its SHA-256 hash, making it immutable and independently verifiable. Evidence connects to claims through typed, weighted edges — a document can corroborate, contextualize, or contradict a claim. Every evidence object records its full provenance chain back to the primary source."
  - heading: "Policy-as-Code"
    units:
      - id: "the-actual-news.policy-as-code.p1"
        elevated_preview: "The publish gate's quality thresholds are not hardcoded but externalized into ve..."
        entry: "I externalized every publish gate threshold into versioned policy packs rather than hardcoding them. A local civic newsroom and a national investigative platform can run the same codebase with different quality configurations. The SQL query that evaluates whether a story can publish literally is the editorial policy -- executable and testable rather than aspirational. Policy packs are immutable once deployed, so you can always trace which standards were in effect when any story was published."
  - heading: "Correction Model and Append-Only History"
    units:
      - id: "the-actual-news.correction-model-and-append-only-history.p1"
        elevated_preview: "Traditional news platforms handle corrections through quiet edits — the original..."
        entry: "I designed corrections as first-class immutable events rather than quiet edits. When a claim is corrected, the original stays intact, a new version is appended with updated evidence, and a correction event records who changed what and why. You can reconstruct the exact state of any story at any point in its history. Conformance test CT-07 enforces this: original records are never deleted or modified."
  - heading: "Database Design and Event-Driven Pipeline"
    units:
      - id: "the-actual-news.database-design-and-event-driven-pipeline.p1"
        elevated_preview: "The PostgreSQL schema consists of ten domain tables plus an event outbox, organi..."
        entry: "I designed a PostgreSQL schema with ten domain tables plus an event outbox, all organized around the verification spine. Identity, content, evidence, claims, verification, and correction tables each own a distinct concern. The event outbox ensures publish events only fire if the transaction commits, and every table is scoped by platform ID so multiple newsrooms can run the same codebase with isolated data."
  - heading: "Economic Model and the AGPL Mandate"
    units:
      - id: "the-actual-news.economic-model-and-the-agpl-mandate.p1"
        elevated_preview: "The economic model follows from the architecture: if value comes from verificati..."
        entry: "I built the economics around verification rather than attention. The evidence graph is the monetizable asset -- institutions and researchers subscribe to structured, verified claims rather than paying for reader eyeballs. The AGPL license enforces the same transparency principle at the code level: a platform built on the premise that evidence should be transparent cannot itself be opaque. Any deployment must share its source, preventing proprietary forks from weakening verification standards."
      - id: "the-actual-news.economic-model-and-the-agpl-mandate.p2"
        elevated_preview: ""
        entry: "I chose five microservices rather than a monolith because each maps to a distinct domain concept that scales independently. During breaking news, the Story and Claim services see high write throughput while Evidence handles sustained read loads. Within each service, business logic lives in rich domain objects -- a Claim can evaluate its own support status and validate its evidence links, not just hold data."
