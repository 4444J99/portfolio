  - heading: "Why Community Infrastructure Cannot Be Deferred"
    units:
      - id: "community-infrastructure.why-community-infrastructure-cannot-be-deferred.p1"
        elevated_preview: "There is a persistent temptation in systems design to treat community as a phase..."
        entry: "I built the community organ from the very beginning, not as a phase-two afterthought. The shared vocabulary and sense-making practices that enable collaboration cannot be bolted on after the technical architecture is complete. They have to grow alongside the system. Community infrastructure is not the last organ to build -- it is the organ that ensures all the others remain buildable."
