title: "Generative Music System"
tagline: "From recursive theory to real-time sound"
sections:
  - heading: "The Translation Problem"
    units:
      - id: "generative-music.the-translation-problem.p1"
        elevated_preview: "How do you get from a formal system to something people actually experience? Tha..."
        entry: "I wanted to turn an abstract rule system into something you can actually hear. This project takes recursive narrative structures and translates them into live generative music -- the sound isn't background decoration, it is the narrative playing out in real time. Every translation choice is itself a creative decision, and that's where the real work lives."
  - heading: "Algorithmic Composition Techniques"
    units:
      - id: "generative-music.algorithmic-composition-techniques.p1"
        elevated_preview: "Three core algorithmic techniques drive the system, selected for their complemen..."
        entry: "I built the system around three algorithmic techniques, each handling a different time scale of music. Markov chains generate melodies note by note, L-systems create self-similar rhythmic patterns, and a stochastic process controls harmonic density. Together they produce music that stays coherent locally while remaining unpredictable over long stretches."
      - id: "generative-music.algorithmic-composition-techniques.p2"
        elevated_preview: "At the note level, melodic contours are generated by first-order Markov chains w..."
        entry: "I use Markov chains for melody, where each note's probability depends on the one before it. When the narrative is stable, the melody moves in small steps; when transformation intensity rises, it starts making dramatic leaps. The matrices reset at each narrative phase transition, creating audible \"chapters\" in the music."
      - id: "generative-music.algorithmic-composition-techniques.p3"
        elevated_preview: "Rhythmic patterns are generated through Lindenmayer systems — string-rewriting g..."
        entry: "I generate rhythmic patterns using L-systems -- string-rewriting rules originally designed to simulate plant growth. A simple rhythmic cell gets expanded recursively into a full bar pattern, and the narrative phase determines which expansion rules are active. Ceremony phases produce symmetrical, structured rhythms; transformation phases introduce syncopation and displacement."
  - heading: "Three-Layer Architecture"
    units:
      - id: "generative-music.three-layer-architecture.p1"
        elevated_preview: "RE:GE provides the structural backbone — a stream of typed, timestamped symbolic..."
        entry: "I feed the system a stream of abstract events from a narrative engine -- things like character state changes and phase transitions. These events have no inherent sound; they're pure structure. The key insight is that meaning comes from how events relate to each other, not from what any single event \"sounds like.\""
      - id: "generative-music.three-layer-architecture.p2"
        elevated_preview: "This is where the artistic decisions live. The bridge maps symbolic events to mu..."
        entry: "I built a bridge to turn abstract ideas into specific sounds. I chose a three-part system so I can tweak the logic while the music keeps playing smoothly. To keep things from sounding messy, I made sure every random note automatically snaps to the right timing and stays perfectly in key."
