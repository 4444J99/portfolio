  - heading: "The Discovery: Recursion Sounds Like Counterpoint"
    units:
      - id: "generative-music.the-discovery-recursion-sounds-like-counterpoint.p1"
        elevated_preview: "This was the project's defining moment, and it wasn't planned. When the recursiv..."
        entry: "This was the project's unplanned breakthrough. I first tried mapping recursive depth to reverb, and it sounded terrible. Then I realized recursion already is counterpoint -- each level of self-reference becomes a new voice commenting on the voices below it. The result sounds like Bach: distinct, layered, and clear enough to follow each level independently."
      - id: "generative-music.the-discovery-recursion-sounds-like-counterpoint.p2"
        elevated_preview: "Counterpoint emerged from experimentation: each recursive level gets its own mel..."
        entry: "I gave each recursive level its own melodic voice, derived from but distinct from its parent. Listeners consistently describe it as \"voices arguing\" or \"a conversation with itself\" -- accurately capturing the self-referential structure without knowing anything about the underlying system. The formal math created a musical insight that pure intuition wouldn't have found."
  - heading: "Time Is the Hardest Translation"
    units:
      - id: "generative-music.time-is-the-hardest-translation.p1"
        elevated_preview: "Narrative time and musical time operate on different scales. We tried linear com..."
        entry: "I tried three approaches to translating narrative time into musical time. Linear compression was boring, pure event-driven was too sparse. I landed on continuous texture punctuated by significant events -- an ongoing musical flow that mirrors how we actually experience narrative: steady consciousness interrupted by meaningful moments."
