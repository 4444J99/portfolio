page: projects/ai-council
title: "AI Council Coliseum"
tagline: "Multi-agent deliberation with gamified governance"
sections:
  - heading: "The Problem: Monologue Masquerading as Deliberation"
    units:
      - id: "ai-council.the-problem-monologue-masquerading-as-deliberation.p1"
        elevated_preview: "The dominant paradigm in AI assistance is the single-agent monologue: one model,..."
        entry: "I noticed that most AI tools work like a single person talking to themselves—one model gives an answer, and you're stuck with its specific biases or mistakes. To fix this, I built a system where multiple different AI models actually debate each other. Instead of just trusting the first thing one model says, I made them challenge each other's logic to catch errors and find a much more reliable, balanced answer."
  - heading: "Technical Architecture: FastAPI + Next.js"
    units:
      - id: "ai-council.technical-architecture-fastapi-next-js.p1"
        elevated_preview: "The Coliseum is built as a decoupled system: I directed the architecture of a Fa..."
        entry: "I built the Coliseum as two separate pieces: a FastAPI backend that runs all the debate logic and a Next.js frontend for live audience interaction. The API is organized around five domains -- agents, events, voting, achievements, and stats -- and I deliberately kept debate state in memory for real-time speed, accepting the tradeoff that a server restart mid-debate would lose progress."
  - heading: "The Deliberation Model"
    units:
      - id: "ai-council.the-deliberation-model.p1"
        elevated_preview: "The Coliseum's deliberation format is not arbitrary — it draws on formal argumen..."
        entry: "I designed the debates to follow a three-round structure: state your position, rebut the opponent, then synthesize. Agents can't just talk past each other -- the system flags any response that doesn't engage with what the other side actually said. The goal isn't to look like a debate; it's to force the kind of adversarial reasoning that actually surfaces better answers."
  - heading: "The Gamification Layer"
    units:
      - id: "ai-council.the-gamification-layer.p1"
        elevated_preview: "Governance is boring. This is not a design flaw — it is a design failure. The Co..."
        entry: "I treated audience engagement as an engineering problem, not an afterthought. The system includes achievements, leaderboards, and unlockable capabilities that reward genuine deliberative behavior -- voting thoughtfully, engaging with diverse topics, identifying synthesis points -- rather than just showing up. The goal is making governance compelling enough that people actually participate."
  - heading: "Voting Sessions and Audience Judgment"
    units:
      - id: "ai-council.voting-sessions-and-audience-judgment.p1"
        elevated_preview: "The voting system implements a three-phase lifecycle: open, active, and finalize..."
        entry: "I built a voting system where audiences rate debates across four dimensions -- argument strength, evidence quality, responsiveness, and rhetorical clarity -- instead of simple thumbs up/down. The entire lifecycle is idempotent, meaning you can safely retry any operation without corrupting results. This matters in production where network issues cause duplicate requests."
  - heading: "Event Ingestion and Source Filtering"
    units:
      - id: "ai-council.event-ingestion-and-source-filtering.p1"
        elevated_preview: "Every action in the Coliseum — agent creation, statement submission, vote cast, ..."
        entry: "I built a system that captures every interaction in the digital arena—from creating participants to casting votes—and streams them into a central record. To keep the data clean, I created filters that instantly verify each event against its source, ensuring only authentic, authorized actions are processed and saved."
  - heading: "Governance Architecture and Honest Scoping"
    units:
      - id: "ai-council.governance-architecture-and-honest-scoping.p1"
        elevated_preview: "The Coliseum's API includes endpoints for blockchain operations — staking, token..."
        entry: "I built a set of digital tools that let the system talk directly to a secure digital ledger. Instead of using complex technical terms, I focused on making it easy to manage digital assets—like locking them in to earn rewards or moving them between users—while ensuring the whole process is transparent and follows strict rules I set up to keep things fair."
  - heading: "Tradeoffs and Lessons"
    units:
      - id: "ai-council.tradeoffs-and-lessons.p1"
        elevated_preview: "The most consequential design decision was in-memory state over a database. For ..."
        entry: "I chose in-memory state over a database because debates are ephemeral performances, not permanent records. The tradeoff is that a server restart mid-debate loses everything. I also found that smarter agents produce better arguments but harder-to-follow debates, so I limited the system to four distinct roles as a compromise between depth and clarity."
