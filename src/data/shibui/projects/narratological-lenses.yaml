  - heading: "Why This Approach Matters"
    units:
      - id: "narratological-lenses.why-this-approach-matters.p1"
        elevated_preview: "The digital humanities have produced remarkable tools for corpus analysis — topi..."
        entry: "I built this because digital humanities tools like topic modeling and sentiment analysis bypass the structural vocabularies narratologists spent a century creating. This project encodes those frameworks as first-class computational objects with typed models and testable assertions. When a narratological claim is a function with tests, scholarly debate gains a new modality."
