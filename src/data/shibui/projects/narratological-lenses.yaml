    units:
      - id: "narratological-lenses.bridge-to-generative-work.p1"
        elevated_preview: "The narratological lenses project occupies a specific position within the eight-..."
        entry: "I built this as theory infrastructure that feeds directly into generative work. A Proppian analysis can drive a music system to shift harmonic mode at narrative turning points. An actantial analysis can determine the spatial layout of a visualization. The lenses turn scholarly frameworks into API endpoints that art tools and product prototypes can call."
