      - id: "recursive-engine.the-question.p1"
        elevated_preview: ""
        entry: "Every software system already tells a story -- user flows are plot arcs, state machines are character development. We treat these as metaphors. I wanted to find out what happens when you treat them as actual engineering principles. Not an AI that writes stories, but a symbolic operating system where narrative rules govern how systems organize and evolve."
      - id: "recursive-engine.the-discovery.p1"
        elevated_preview: ""
        entry: "The biggest surprise wasn't technical -- it was creative. Having 21 distinct organ types with formal interfaces gave me more creative possibilities than working without structure. When you know what a transformation guarantees, you can safely compose it with others. Formalism enables creativity. That insight reshaped how I think about every system I build."
