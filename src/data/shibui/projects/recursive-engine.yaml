  - heading: "System Architecture"
    units:
      - id: "recursive-engine.system-architecture.p1"
        elevated_preview: "RE:GE is organized into eight architectural layers, each with a single responsib..."
        entry: "I organized the engine into eight layers, each with a single job. At the center is a priority queue I called the Soul Patchbay that routes symbolic operations to the right handler, with built-in collision detection and deadlock prevention."
      - id: "recursive-engine.system-architecture.p2"
        elevated_preview: "The dispatcher implements a six-phase lifecycle for every invocation: PARSE → VA..."
        entry: "Every command goes through six stages: parse, validate, queue, execute, format, and log. Each stage has its own failure handling. I also built a depth tracker with four tiers of recursion limits to prevent the system from referencing itself infinitely while still allowing meaningful recursive operations."
      - id: "recursive-engine.system-architecture.p3"
        elevated_preview: ""
        entry: "Every organ implements the same base contract, which handles validation, state persistence, and checkpointing. Adding a new organ means implementing that contract -- you never have to modify the routing infrastructure. The system grows by adding processors, not by rewiring the core."
  - heading: "The Ritual Syntax"
    units:
